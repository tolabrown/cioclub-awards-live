services:
  cio:
    build: https://github.com/edniesal/cioclub-awards-live.git#main
    restart: always
    expose:
      - "3000"
    networks:
      - dokploy-network
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - ORIGIN=https://thecioclubafrica.com
      - BODY_SIZE_LIMIT=10485760
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://thecioclubafrica.com
      - PUBLIC_BETTER_AUTH_URL=https://thecioclubafrica.com
      - DATABASE_URL=${DATABASE_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - REDIRECT_URI=https://thecioclubafrica.com/api/auth/callback/google
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT:-443}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - EMAIL_WEBHOOK=${EMAIL_WEBHOOK}
      - NEWS_ARTICLE=${NEWS_ARTICLE}
      - PS_SECRET_KEY=${PS_SECRET_KEY}
      - FW_PUBLIC_KEY=${FW_PUBLIC_KEY}
      - FW_SECRET_KEY=${FW_SECRET_KEY}
      - FW_ENCRYPTION_KEY=${FW_ENCRYPTION_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      # ── Main router (canonical domain) ───────────────────────────────────
      - "traefik.http.routers.cio.rule=Host(`thecioclubafrica.com`) || Host(`www.thecioclubafrica.com`)"
      - "traefik.http.routers.cio.entrypoints=websecure"
      - "traefik.http.routers.cio.tls=true"
      - "traefik.http.routers.cio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cio.middlewares=redirect-www-thecioclubafrica"

      # ── Redirect router for thecioawards.ng ──────────────────────────────
      - "traefik.http.routers.cio-awards-redirect.rule=Host(`thecioawards.ng`) || Host(`www.thecioawards.ng`)"
      - "traefik.http.routers.cio-awards-redirect.entrypoints=websecure"
      - "traefik.http.routers.cio-awards-redirect.tls=true"
      - "traefik.http.routers.cio-awards-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cio-awards-redirect.middlewares=redirect-thecioawards"
      - "traefik.http.routers.cio-awards-redirect.service=cio"

      # ── Service ───────────────────────────────────────────────────────────
      - "traefik.http.services.cio.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
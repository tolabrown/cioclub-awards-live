version: "3.8"
services:
  cioclub:
    image: your-registry/cioclub:latest
    restart: always
    ports:
      - "3000"
    networks:
      - dokploy-network
    environment:
      # Server config
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - ORIGIN=https://cioclub.com
      
      # Better Auth
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://cioclub.com
      - BETTER_API_URL=https://cioclub.com/api/auth
      
      # Database
      - DATABASE_URL=${DATABASE_URL}
      
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      
      # MinIO
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_BUCKET=${MINIO_BUCKET}
      
      # Webhooks
      - EMAIL_WEBHOOK=${EMAIL_WEBHOOK}
      - BODY_SIZE_LIMIT=10485760
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cioclub.rule=Host(`cioclub.com`)"
      - "traefik.http.routers.cioclub.entrypoints=websecure"
      - "traefik.http.routers.cioclub.tls.certresolver=letsencrypt"
      - "traefik.http.services.cioclub.loadbalancer.server.port=3000"
      
      # www redirect
      - "traefik.http.routers.cioclub-www.rule=Host(`www.cioclub.com`)"
      - "traefik.http.routers.cioclub-www.entrypoints=websecure"
      - "traefik.http.routers.cioclub-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cioclub-www.middlewares=cioclub-www-redirect"
      - "traefik.http.middlewares.cioclub-www-redirect.redirectregex.regex=^https://www\\.cioclub\\.com/(.*)"
      - "traefik.http.middlewares.cioclub-www-redirect.redirectregex.replacement=https://cioclub.com/$${1}"
      - "traefik.http.middlewares.cioclub-www-redirect.redirectregex.permanent=true"

networks:
  dokploy-network:
    external: true
